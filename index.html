<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TMI Studios — Internet Product Lab</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
--bg:#0b0015;
--accent:#b388ff;
--text:#f4f4f4;
--muted:#c0bcd0;
--font:'Space Grotesk',sans-serif;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:var(--font);
background:var(--bg);
color:var(--text);
}

/* NAV */
nav{
display:flex;
justify-content:space-between;
padding:1rem;
}

/* HERO */
.hero{
min-height:80vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:1rem;
}

/* SECTIONS */
section{
padding:6rem 10%;
max-width:1200px;
margin:0 auto 80px auto;
text-align:center;
}
section h2{
margin-bottom:1rem;
}

/* GRID (no scroll) */
.projects{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(260px, 1fr));
gap:2rem;
margin-top:2rem;
}

/* CARD */
.project{
background:rgba(255,255,255,.05);
padding:1.5rem;
border-radius:14px;
position:relative;
transition: all .4s ease;
opacity:0;
transform:translateY(40px);
}

.project.show{
opacity:1;
transform:translateY(0);
}

.project img{
width:100%;
border-radius:12px;
margin-bottom:1rem;
}

/* TRENDING BADGE */
.trending-badge{
position:absolute;
top:10px;
left:10px;
background:#ff3d3d;
color:#fff;
font-size:.7rem;
font-weight:700;
padding:4px 8px;
border-radius:8px;
animation:glow 1.5s infinite alternate;
}

@keyframes glow{
0%{box-shadow:0 0 5px #ff3d3d;}
100%{box-shadow:0 0 15px #ff3d3d;}
}

/* BUTTON */
.tile-btn{
display:inline-block;
margin-top:10px;
padding:.5rem 1rem;
border:1px solid var(--accent);
border-radius:999px;
color:var(--accent);
text-decoration:none;
transition:.3s;
}
.tile-btn:hover{
background:var(--accent);
color:#000;
}

/* FOOTER */
footer{
text-align:center;
padding:2rem;
color:#888;
}
</style>
</head>

<body>

<header class="hero">
<h1>TMI Studios</h1>
<p>We build viral internet apps.</p>
</header>

<!-- TOXIC LAB -->
<section>
<h2>☠️ Toxic Lab</h2>
<div class="projects" id="toxicLab"></div>
</section>

<!-- VIBE LAB -->
<section>
<h2>💖 Vibe Lab</h2>
<div class="projects" id="vibeLab"></div>
</section>

<!-- TMI LAB -->
<section>
<h2>🧪 TMI Lab</h2>
<div class="projects" id="tmiLab"></div>
</section>

<footer>© 2026 TMI Studios</footer>

<script>
// FETCH APPS
async function loadLabApps(){
const res = await fetch('apps/apps.json');
const apps = await res.json();

['toxicLab','vibeLab','tmiLab'].forEach(lab=>{
const container = document.getElementById(lab);
const filtered = apps.filter(a=>a.section===lab).slice(-3).reverse();

filtered.forEach(app=>{
const div=document.createElement('div');
div.className='project';

div.innerHTML=`
${app.trending ? '<div class="trending-badge">🔥 Trending</div>' : ''}
<img src="${app.image}">
<h3>${app.name}</h3>
<p>${app.description}</p>
<a href="${app.link}" class="tile-btn">Open</a>
`;

container.appendChild(div);
});
});

observeCards();
}

loadLabApps();


// SCROLL ANIMATION
function observeCards(){
const cards=document.querySelectorAll('.project');

const observer=new IntersectionObserver(entries=>{
entries.forEach(entry=>{
if(entry.isIntersecting){
entry.target.classList.add('show');
}
});
},{threshold:0.2});

cards.forEach(card=>observer.observe(card));
}
</script>

</body>
</html>
