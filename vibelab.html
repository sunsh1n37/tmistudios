<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vibe Lab | Quizzes & Tests</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Poppins',sans-serif;
  background:radial-gradient(circle at top,#1c0025,#0b0014);
  color:white;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  overflow-x:hidden;
  position:relative;
}

.particle{
  position:absolute;
  border-radius:50%;
  opacity:0.6;
  animation: float 12s linear infinite;
  pointer-events:none;
}
@keyframes float{
  0%{transform:translateY(0) translateX(0);}
  50%{transform:translateY(-100px) translateX(30px);}
  100%{transform:translateY(-200px) translateX(-20px);}
}

header{
  text-align:center;
  padding:40px 20px 20px;
  position:relative;
  z-index:2;
}
header h1{
  font-size:36px;
  background:linear-gradient(90deg,#ff4db8,#ff7a18);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
header p{
  opacity:.7;
  margin-top:10px;
  font-size:16px;
}

.quiz-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:25px;
  padding:30px 20px;
  flex:1;
  position:relative;
  z-index:2;
}

.quiz-card{
  display:block;
  text-decoration:none;
  color:white;
  background:rgba(0,0,0,.55);
  backdrop-filter:blur(12px);
  border-radius:18px;
  padding:25px 20px;
  text-align:center;
  box-shadow:0 0 25px rgba(255,0,150,.2);
  transition:.3s, transform .3s;
}
.quiz-card:hover{
  transform:translateY(-8px) scale(1.02);
  box-shadow:0 0 45px rgba(255,77,180,.5);
}
.quiz-card h3{
  font-size:20px;
  margin-bottom:10px;
  background:linear-gradient(90deg,#ff4db8,#ff7a18);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.quiz-card p{
  font-size:14px;
  opacity:.85;
}
.quiz-card button{
  margin-top:15px;
  padding:10px 18px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
  font-size:14px;
  background:linear-gradient(135deg,#ff2d75,#ff7a18);
  color:white;
  transition:.25s;
}
.quiz-card button:hover{
  transform:scale(1.05);
}

footer{
  text-align:center;
  padding:15px 10px;
  font-size:14px;
  color:#aaa;
  position:relative;
  z-index:2;
}
footer a{
  color:inherit;
  text-decoration:none;
  margin:0 5px;
  transition:.3s;
}
footer a:hover{color:#ff4d4d;}
</style>
</head>
<body>

<div id="particles"></div>

<header>
  <h1>Vibe Lab</h1>
  <p>Explore fun personality quizzes & tests — find your vibe!</p>
</header>

<!-- GRID (now dynamic) -->
<section class="quiz-grid" id="quizGrid"></section>

<footer>
  <p>© 2026 TMI Studios</p>
  <p>
    <a href="Terms.html">Terms</a> · 
    <a href="index.html">Home</a> · 
    <a href="lab.html">Labs</a> · 
    <a href="toxiclab.html">Viral Quizzes</a>
  </p>
</footer>

<script>
/* PARTICLES */
const particleCount = 30;
const particlesContainer = document.getElementById("particles");

for(let i=0;i<particleCount;i++){
  const p = document.createElement("div");
  p.classList.add("particle");
  const size = Math.random()*8 + 4;
  p.style.width = `${size}px`;
  p.style.height = `${size}px`;
  p.style.background = `rgba(${Math.floor(Math.random()*255)},${Math.floor(Math.random()*255)},${Math.floor(Math.random()*255)},0.6)`;
  p.style.left = `${Math.random()*100}vw`;
  p.style.top = `${Math.random()*100}vh`;
  p.style.animationDuration = `${6 + Math.random()*8}s`;
  particlesContainer.appendChild(p);
}

/* FETCH APPS */
fetch("/apps/apps.json")
  .then(res => res.json())
  .then(data => {
    const grid = document.getElementById("quizGrid");

    const apps = data.filter(app => app.section === "vibeLab");

    apps.forEach(app => {
      const card = document.createElement("a");
      card.href = app.link;
      card.className = "quiz-card";

      card.innerHTML = `
        <i class="fas fa-star"></i>
        <h3>${app.name}</h3>
        <p>${app.description}</p>
        <button>Take Quiz</button>
      `;

      grid.appendChild(card);
    });
  })
  .catch(err => {
    console.error("Error loading apps:", err);
  });
</script>

</body>
</html>
