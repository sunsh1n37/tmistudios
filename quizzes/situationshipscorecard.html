<style>

body{

nav{

}

#shareCard h3{

#shareCard img{

.brand{

.share-btn{

<h1>Is It Love or Delulu?</h1>
<h2>This quiz will expose the vibes. No sugarcoating. 👀</h2>

<div id="quiz-container"></div>

<div id="progressBar"><div id="progress"></div></div>

<button id="nextQuizBtn" onclick="unlockNextQuiz()">🔒 Unlock Next Quiz – R19</button>

<!-- SHARE CARD -->

<div id="shareCard">
<h3 id="cardResult"></h3>
<p id="cardScore"></p>
<img id="cardImg">
<div class="brand">Made by TMI Studios • tmistudios.xyz</div>
</div>

<div id="resultActions">
<button class="share-btn" onclick="downloadResult()">Download Result</button>
<button class="share-btn" onclick="shareWhatsApp()">Share WhatsApp</button>
<button class="share-btn" onclick="shareTwitter()">Share Twitter</button>
</div>

<footer class="skinny-footer">
<p>© 2026 TMI Studios</p>
<nav class="footer-links">

</nav>

<script>

const questions=[
{question:"How often do you two actually make plans?",options:[
{text:"We plan vibes but never link",score:2},
{text:"Only after 11PM",score:1},
{text:"Actual dates regularly",score:0}
]},
{question:"Have you met their friends?",options:[
{text:"Never",score:2},
{text:"Only the boys",score:1},
{text:"Yes properly",score:0}
]},
{question:"Future talk?",options:[
{text:"They disappear",score:2},
{text:"They dodge it",score:1},
{text:"We discuss it",score:0}
]},
{question:"Your label?",options:[
{text:"Friend???",score:2},
{text:"We're chilling",score:1},
{text:"Partner",score:0}
]},
{question:"Text consistency?",options:[
{text:"Only when bored",score:2},
{text:"Inconsistent",score:1},
{text:"Daily",score:0}
]}
]

let currentQuestion=0
let totalScore=0

function showQuestion(){

const container=document.getElementById("quiz-container")
container.innerHTML=""

if(currentQuestion<questions.length){

const q=questions[currentQuestion]

const qDiv=document.createElement("div")
qDiv.innerHTML="<b>"+q.question+"</b>"

container.appendChild(qDiv)

q.options.forEach(opt=>{

const btn=document.createElement("div")
btn.className="option"
btn.innerText=opt.text

btn.onclick=()=>{
totalScore+=opt.score
currentQuestion++
updateProgressBar()
showQuestion()
}

container.appendChild(btn)

})

}else{
showResult()
document.getElementById("nextQuizBtn").style.display="block"
}

}

function updateProgressBar(){
const percent=(currentQuestion/questions.length)*100
document.getElementById("progress").style.width=percent+"%"
}

function showResult(){

const percentage=Math.round((totalScore/(questions.length*2))*100)

let result=""
let gif=1

if(totalScore>=9){result="🚩 Deep in Delulu Territory";gif=1}
else if(totalScore>=7){result="😬 Ghosting Risk";gif=2}
else if(totalScore>=5){result="⚠️ Situationship Zone";gif=3}
else if(totalScore>=3){result="💖 Might Be Real";gif=4}
else{result="🌟 Healthy Relationship Energy";gif=5}

document.getElementById("shareCard").style.display="block"
document.getElementById("cardResult").innerText=result
document.getElementById("cardScore").innerText="Situationship Score: "+percentage+"%"
document.getElementById("cardImg").src="situationship"+gif+".jpg"

document.getElementById("resultActions").style.display="block"

}

function downloadResult(){

html2canvas(document.getElementById("shareCard")).then(canvas=>{
const link=document.createElement("a")
link.download="situationship-result.png"
link.href=canvas.toDataURL()
link.click()
})

}

function shareWhatsApp(){
const text="I just took the Situationship Quiz 😂 Try it: "+window.location.href
window.open("https://wa.me/?text="+encodeURIComponent(text))
}

function shareTwitter(){
const text="I just took the Situationship Quiz 💀"
const url=window.location.href
window.open("https://twitter.com/intent/tweet?text="+encodeURIComponent(text)+"&url="+encodeURIComponent(url))
}

function unlockNextQuiz(){
window.location.href="https://tmistudios.xyz/.netlify/functions/payfast?product=next_quiz_r19"
}

showQuestion()

</script>
</body>
</html>
