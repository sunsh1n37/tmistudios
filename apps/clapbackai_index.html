<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClapbackAI — Text Him Back Like a Pro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
:root { --bg:#f5f5f7; --card:rgba(255,255,255,0.75); --accent:#ff4d88; --accent-soft:#ffe4ec; --text:#1c1c1e; }
body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif; background:linear-gradient(180deg,#fff,#ffeef3); color:var(--text); display:flex; justify-content:center; }
.phone { max-width:420px; width:100%; height:100vh; display:flex; flex-direction:column; background:transparent; }
.header { padding:18px; text-align:center; font-weight:600; font-size:18px; backdrop-filter:blur(10px); }
.chat { flex:1; padding:16px; overflow-y:auto; }
.bubble { max-width:75%; padding:12px 16px; border-radius:20px; margin-bottom:10px; font-size:14px; line-height:1.4; animation:fadeIn 0.3s ease; }
.received { background:#e9e9eb; color:black; }
.sent { background:linear-gradient(135deg,#ff4d88,#ff7aa8); color:white; margin-left:auto; }
.input-area { padding:12px; backdrop-filter:blur(10px); }
textarea { width:100%; border-radius:14px; padding:12px; border:none; background:#f2f2f7; font-size:14px; outline:none; }
button { width:100%; margin-top:10px; padding:14px; border:none; border-radius:14px; background:linear-gradient(135deg,#ff4d88,#ff7aa8); color:white; font-size:16px; font-weight:600; cursor:pointer; transition:0.2s; }
button:active { transform:scale(0.97); }
.result { padding:16px; background:white; border-top-left-radius:20px; border-top-right-radius:20px; box-shadow:0 -4px 20px rgba(0,0,0,0.05); }
.score { font-size:26px; font-weight:700; color:var(--accent); }
.card { margin-top:12px; padding:14px; border-radius:16px; background:rgba(255,255,255,0.75); backdrop-filter:blur(12px); font-size:14px; }
.card.locked { filter:blur(8px); }
.paywall { margin-top:12px; padding:16px; border-radius:16px; background:linear-gradient(135deg,#fff0f5,#ffe4ec); text-align:center; font-size:14px; }
.paywall button { margin-top:10px; }
.actions { display:flex; gap:10px; margin-top:12px; }
.actions button { flex:1; background:#1c1c1e; color:white; }
.typing { display:inline-block; width:12px; height:12px; border-radius:50%; background:white; margin-right:4px; animation:bounce 1s infinite ease-in-out; }
.typing:nth-child(2) { animation-delay:0.2s; }
.typing:nth-child(3) { animation-delay:0.4s; }
@keyframes bounce { 0%,80%,100% {transform:scale(0);} 40%{transform:scale(1);} }
@keyframes fadeIn { from{opacity:0; transform:translateY(5px);} to{opacity:1; transform:translateY(0);} }
</style>
</head>
<body>
<div class="phone">
    <div class="header">💬 ClapbackAI</div>
    <div class="chat" id="chat"></div>

    <div class="input-area">
        <textarea id="inputText" placeholder="Paste his message..."></textarea>
        <button onclick="startAnalysis()">Analyze</button>
    </div>

    <div class="result" id="result" style="display:none;">
        <!-- Screenshot container: now includes original text + free replies -->
        <div id="screenshotArea">
            <div class="score" id="score"></div>
            <div class="card" id="originalTextCard"></div>
            <div class="card" id="meaningCard"></div>
            <div class="card" id="freeRepliesCard"></div>
            <div style="text-align:center; font-size:12px; margin-top:8px; color:#aaa;">Made at tmistudios.xyz</div>
        </div>

        <!-- Premium replies visible but NOT in screenshot -->
        <div class="card locked" id="premiumRepliesCard">
            <strong>Premium Replies 🔒</strong><br><br>
            🐈‍⬛️ Black Cat<br>
            🖤 Dark Femme
        </div>

        <!-- Paywall CTA -->
        <div class="paywall" id="paywall">
            🔒 Unlock premium features<br><br>
            <button onclick="paySubscription(49)">R49 / month</button>
            <button onclick="paySubscription(99)">R99 / month</button>
            <button onclick="paySubscription(199)">R199 / month</button>
        </div>

        <div class="actions">
            <button onclick="resetApp()">Reset</button>
            <button id="shareBtn">Screenshot</button>
        </div>
    </div>
</div>

<script>
// ===== Meaning Pools =====
const meaningPools = {
  wyd:["Low effort. He wants access without effort.","Casual energy. Minimal thought.","Just checking in, not serious.","Testing waters without commitment."],
  "you up":["Late-night convenience energy.","Only texting when easy for him.","Not fully invested, just curious.","Casual, opportunistic vibe."],
  miss:["Emotional pull. He’s thinking about you.","Sentimental energy. Wants connection.","Feeling nostalgic or affectionate.","Trying to draw you in emotionally."],
  question:["He wants engagement.","Looking for a response.","Curious about your reaction.","Testing if you’ll chase."],
  longMsg:["High emotional investment.","Effort shows he cares.","Lots of thought in this one.","Shows deep interest."],
  shortMsg:["Low effort. You're an option.","Brief text, minimal investment.","Quick message, could be distracted.","Minimal engagement."],
  neutral:["Neutral energy.","Nothing major.","No strong signals.","Balanced, could go either way."],

  // Realistic scenario use cases
  coffee:["Inviting you to coffee. Testing vibe.","Casual hangout, playful interest.","Curious about you in person.","Low-key effort but genuine interest."],
  dinner:["Suggests dinner. Romantic or strategic.","Shows interest and initiative.","Could be a date or casual meet-up.","Testing if you’ll accept."],
  cook:["Offers to cook for you. Trying to impress.","Effort shows he wants closeness.","Romantic or cozy vibes.","Checking how you respond emotionally."],
  comeOver:["Asks you to come over. Casual or flirty.","Testing comfort level and trust.","Seeing if you’ll chase.","Intent could be romantic or playful."],
  hangout:["Wants to hang out. Casual friend or flirty.","Testing chemistry in person.","Low-stakes invitation.","Evaluating emotional pull."],
  gift:["Mentions a gift. Flirty or thoughtful.","Trying to charm you.","Shows effort but may be manipulative.","Checking your reaction."],
  plan:["Proposes a plan. Could be fun or romantic.","Testing if you’ll commit.","Low effort vs high effort signal.","Casual or serious interest."],
  apology:["Says sorry. Genuine or manipulative.","Attempting to reconcile.","Checking emotional pull.","Testing if you forgive easily."],
  tease:["Playful poke. Flirty or attention-seeking.","Testing boundaries.","Checking your reaction.","Low effort, high engagement."],
  rant:["Long vent/message. Needs empathy.","Testing emotional availability.","Seeking validation or attention.","Shows deep personal investment."],
  late:["Texting after hours. Convenience or curiosity.","Casual night vibes.","Checking if you’re awake.","Testing patience or availability."],
  snap:["Quick DM or snap. Casual flirt.","Minimal effort, wants a reaction.","Low-stakes engagement.","Testing playfulness."],
  emoji:["Emojis only. Flirty or lazy.","Minimal effort, playful.","Checking how you respond.","Trying to provoke fun."],
  mixed:["Mixed signals. Hard to read.","Pulls away then engages.","Testing chase and patience.","Low-to-medium investment."],
  overText:["Floods you with messages. Clingy.","High effort but maybe annoying.","Seeking constant attention.","Testing chase dynamics."]
};

// ===== Reply Pools =====
const replyPools = {
  // Free vs Premium
  wyd:{ soft:["Just chilling 😊 you?","Kinda relaxed, you?"], savage:["Living my life. You?","Try harder 😏"] },
  "you up":{ soft:["Barely lol","Sup?"], savage:["No ❤️","Not at this hour 😈"] },
  miss:{ soft:["Aww 🥺","I know 😌"], savage:["I know 😈","Miss me? Cute 😏"] },
  question:{ soft:["Haha yeah 😊","Sure"], savage:["Why? 😈","Do I look like I care 😏"] },
  longMsg:{ soft:["That was sweet 🥺","Thanks for sharing"], savage:["You wrote all that? 😈","Try again, honey 😏"] },
  shortMsg:{ soft:["Hey 😊","Hi there"], savage:["That’s it? 😈","Do better 😎"] },
  neutral:{ soft:["Nice 😊","Okay…"], savage:["Okay… 😈","Move along 😎"] },

  // Real-life scenario replies
  coffee:{ soft:["Sure, coffee sounds good ☕","I can do coffee 😌"], savage:["Only if you bring your A-game 😈","Cute, but I pick the place 😏"] },
  dinner:{ soft:["Dinner works 🍝","Sounds tasty 😌"], savage:["I cook better than you 😈","Bring appetite, not attitude 😏"] },
  cook:{ soft:["Love that 😌","You cook? Cool 😏"], savage:["I hope it’s edible 😈","Better be gourmet 😏"] },
  comeOver:{ soft:["Might be fun 😌","Could swing by 😏"], savage:["I hope it’s not just Netflix 😈","Don’t waste my couch 😏"] },
  hangout:{ soft:["Sounds fun 😌","I’m in 😏"], savage:["Only if it’s not boring 😈","Make it interesting 😏"] },
  gift:{ soft:["Thanks 😌","Cute gesture 😏"], savage:["Bribery won’t work 😈","I don’t need that 😏"] },
  plan:{ soft:["Sure, I’m free 😌","Sounds good 😏"], savage:["Not today 😈","Pick a better time 😏"] },
  apology:{ soft:["It’s okay 😌","No worries 😏"], savage:["Do better next time 😈","Words aren’t enough 😏"] },
  tease:{ soft:["Haha 😏","You’re funny 😌"], savage:["Try harder 😈","I see you 😎"] },
  rant:{ soft:["Wow 😌","Thanks for sharing"], savage:["Keep it short 😈","I don’t care 😏"] },
  late:{ soft:["Up late too 😌","Just winding down"], savage:["Night owl? Try again 😈","I’m busy 😎"] },
  snap:{ soft:["Got your snap 😌","Funny 😏"], savage:["Try harder 😈","Cute attempt 😏"] },
  emoji:{ soft:["Cute 😌","Fun 😂"], savage:["Is that it? 😈","I see you trying 😎"] },
  mixed:{ soft:["Confusing 😌","Hmm 😏"], savage:["Stop playing 😈","Pick a lane 😏"] },
  overText:{ soft:["Whoa 😌","Chill 😏"], savage:["Enough already 😈","I’m not your diary 😎"] }
};

// ===== Utility =====
function getRandom(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function getMeaning(poolName){ return getRandom(meaningPools[poolName]||meaningPools.neutral); }
function addBubble(text,type="received"){
  const chat=document.getElementById("chat");
  const div=document.createElement("div");
  div.className="bubble "+type;
  div.innerHTML=text;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

// ===== Start analysis =====
function startAnalysis(){
  const input=document.getElementById("inputText").value;
  if(!input)return;
  document.getElementById("chat").innerHTML="";
  document.getElementById("result").style.display="none";

  addBubble(input,"received");

  setTimeout(()=>{
    const typing=document.createElement("div");
    typing.className="bubble sent"; typing.id="typingBubble";
    typing.innerHTML=`<span class="typing"></span><span class="typing"></span><span class="typing"></span>`;
    document.getElementById("chat").appendChild(typing); typing.scrollIntoView();
  },500);

  setTimeout(()=>{
    const typing=document.getElementById("typingBubble");
    if(typing) typing.remove();
    analyze(input);
  },2000);
}

// ===== Analyze text =====
function analyze(textRaw){
  const text=textRaw.toLowerCase(); 
  let effortScore=60+Math.random()*30; 
  let meaning=""; 
  let replies={};

  const isShort=text.length<12; 
  const isLong=text.length>80;

  if(text.includes("wyd")){ meaning=getMeaning("wyd"); replies=replyPools.wyd; effortScore=45; }
  else if(text.includes("you up")){ meaning=getMeaning("you up"); replies=replyPools["you up"]; effortScore=35; }
  else if(text.includes("miss")){ meaning=getMeaning("miss"); replies=replyPools.miss; effortScore=85; }
  else if(text.includes("?")){ meaning=getMeaning("question"); replies=replyPools.question; effortScore=75; }
  else if(text.includes("coffee")){ meaning=getMeaning("coffee"); replies=replyPools.coffee; effortScore=60; }
  else if(text.includes("dinner")){ meaning=getMeaning("dinner"); replies=replyPools.dinner; effortScore=65; }
  else if(text.includes("cook")){ meaning=getMeaning("cook"); replies=replyPools.cook; effortScore=70; }
  else if(text.includes("come over")){ meaning=getMeaning("comeOver"); replies=replyPools.comeOver; effortScore=70; }
  else if(text.includes("hangout")){ meaning=getMeaning("hangout"); replies=replyPools.hangout; effortScore=60; }
  else if(text.includes("gift")){ meaning=getMeaning("gift"); replies=replyPools.gift; effortScore=60; }
  else if(text.includes("plan")){ meaning=getMeaning("plan"); replies=replyPools.plan; effortScore=60; }
  else if(text.includes("apology")){ meaning=getMeaning("apology"); replies=replyPools.apology; effortScore=60; }
  else if(text.includes("tease")){ meaning=getMeaning("tease"); replies=replyPools.tease; effortScore=50; }
  else if(text.includes("rant")){ meaning=getMeaning("rant"); replies=replyPools.rant; effortScore=60; }
  else if(text.includes("late")){ meaning=getMeaning("late"); replies=replyPools.late; effortScore=45; }
  else if(text.includes("snap")){ meaning=getMeaning("snap"); replies=replyPools.snap; effortScore=50; }
  else if(text.includes("emoji")){ meaning=getMeaning("emoji"); replies=replyPools.emoji; effortScore=45; }
  else if(text.includes("mixed")){ meaning=getMeaning("mixed"); replies=replyPools.mixed; effortScore=65; }
  else if(text.includes("overtext")){ meaning=getMeaning("overText"); replies=replyPools.overText; effortScore=55; }
  else if(isLong){ meaning=getMeaning("longMsg"); replies=replyPools.longMsg; effortScore=90; }
  else if(isShort){ meaning=getMeaning("shortMsg"); replies=replyPools.shortMsg; effortScore=45; }
  else{ meaning=getMeaning("neutral"); replies=replyPools.neutral; effortScore=65; }

  effortScore=Math.round(effortScore); 
  showResult(textRaw, effortScore, meaning, replies);
}

// ===== Show result =====
function showResult(originalText, score, meaning, replies){
  const result=document.getElementById("result"); 
  result.style.display="block";

  document.getElementById("score").innerText=`Effort Score: ${score}/100`;
  document.getElementById("originalTextCard").innerHTML=`<strong>Message:</strong><br>${originalText}`;
  document.getElementById("meaningCard").innerHTML=`<strong>What he means:</strong><br>${meaning}`;

  document.getElementById("freeRepliesCard").innerHTML=`
    <strong>Replies:</strong><br><br>
    💕 ${replies.soft}<br>
    😈 ${replies.savage}<br>
  `;
}

// ===== Reset / Screenshot =====
function resetApp(){
  document.getElementById("chat").innerHTML="";
  document.getElementById("result").style.display="none";
  document.getElementById("inputText").value="";
}

// Screenshot button
document.getElementById("shareBtn").addEventListener("click", function(){
  const area=document.getElementById("screenshotArea");
  if(!area)return;

  html2canvas(area,{scale:2}).then(canvas=>{
    const link=document.createElement("a");
    link.download="clapbackai-text.png";
    link.href=canvas.toDataURL("image/png");
    link.click();
  }).catch(err=>{
    console.error("Screenshot failed:", err);
    alert("Screenshot failed. Try again.");
  });
});

// Pay subscription placeholder
function paySubscription(amount){
  fetch("/.netlify/functions/payfast",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({product:"clapbackai", amount:amount})
  })
  .then(res=>res.json())
  .then(data=>{
    if(data.url){ 
      window.location.href = data.url; 
    } else { 
      alert("Error generating payment link"); 
    }
  })
  .catch(err=>{
    console.error(err);
    alert("Payment request failed");
  });
}
</script>
</body>
</html>
