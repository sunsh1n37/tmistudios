<style>
:root { --bg:#f5f5f7; --card:rgba(255,255,255,0.75); --accent:#ff4d88; --accent-soft:#ffe4ec; --text:#1c1c1e; }
body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif; background:linear-gradient(180deg,#fff,#ffeef3); color:var(--text); display:flex; justify-content:center; }

.sent { background:linear-gradient(135deg,#ff4d88,#ff7aa8); color:white; margin-left:auto; }

textarea { width:100%; border-radius:14px; padding:12px; border:none; background:#f2f2f7; font-size:14px; outline:none; }
button { width:100%; margin-top:10px; padding:14px; border:none; border-radius:14px; background:linear-gradient(135deg,#ff4d88,#ff7aa8); color:white; font-size:16px; font-weight:600; cursor:pointer; transition:0.2s; }
button:active { transform:scale(0.97); }
.result { padding:16px; background:white; border-top-left-radius:20px; border-top-right-radius:20px; box-shadow:0 -4px 20px rgba(0,0,0,0.05); }

.locked { filter:blur(8px); position:relative; }
.paywall { margin-top:12px; padding:16px; border-radius:16px; background:linear-gradient(135deg,#fff0f5,#ffe4ec); text-align:center; font-size:14px; }
.paywall button { margin-top:10px; }

.typing:nth-child(2) { animation-delay:0.2s; }
.typing:nth-child(3) { animation-delay:0.4s; }
@keyframes bounce { 0%,80%,100% {transform:scale(0);} 40%{transform:scale(1);} }
@keyframes fadeIn { from{opacity:0; transform:translateY(5px);} to{opacity:1; transform:translateY(0);} }

<body>
<div class="phone">
    <div class="header">💬 ClapbackAI</div>
    <div class="chat" id="chat"></div>

    <div class="input-area">
        <textarea id="inputText" placeholder="Paste his message..."></textarea>
        <button onclick="startAnalysis()">Analyze</button>
    </div>

    <div class="result" id="result" style="display:none;">
        <div id="screenshotArea">
            <div class="score" id="score"></div>
            <div class="card" id="meaningCard"></div>
            <div class="card" id="repliesCard"></div>
            <div style="text-align:center; font-size:12px; margin-top:8px; color:#aaa;">Made at tmistudios.xyz</div>
        </div>

        <div class="paywall" id="paywall">
            🔒 Unlock premium features<br><br>
            <button onclick="paySubscription(49)">R49 / month</button>
            <button onclick="paySubscription(99)">R99 / month</button>
            <button onclick="paySubscription(199)">R199 / month</button>
        </div>

        <div class="actions">
            <button onclick="resetApp()">Reset</button>
            <button onclick="share()">Screenshot</button>
        </div>
    </div>
</div>

<script>
let unlocked=false;

// ===== Meaning Pools =====
const meaningPools = {
  wyd:["Low effort. He wants access without effort.","Casual energy. Minimal thought.","Just checking in, not serious.","Testing waters without commitment."],
  "you up":["Late-night convenience energy.","Only texting when easy for him.","Not fully invested, just curious.","Casual, opportunistic vibe."],
  miss:["Emotional pull. He’s thinking about you.","Sentimental energy. Wants connection.","Feeling nostalgic or affectionate.","Trying to draw you in emotionally."],
  question:["He wants engagement.","Looking for a response.","Curious about your reaction.","Testing if you’ll chase."],
  longMsg:["High emotional investment.","Effort shows he cares.","Lots of thought in this one.","Shows deep interest."],
  shortMsg:["Low effort. You're an option.","Brief text, minimal investment.","Quick message, could be distracted.","Minimal engagement."],
  neutral:["Neutral energy.","Nothing major.","No strong signals.","Balanced, could go either way."]
};

const archetypes=["soft","savage","blackCat","darkFemme"];
function getRandom(arr){return arr[Math.floor(Math.random()*arr.length)];}
function getMeaning(poolName){return getRandom(meaningPools[poolName]||meaningPools.neutral);}

// ===== Chat bubble =====
function addBubble(text,type="received"){const chat=document.getElementById("chat");const div=document.createElement("div");div.className="bubble "+type;div.innerHTML=text;chat.appendChild(div);chat.scrollTop=chat.scrollHeight;}

// ===== Start analysis =====
function startAnalysis(){
  const input=document.getElementById("inputText").value;
  if(!input)return;
  document.getElementById("chat").innerHTML="";
  document.getElementById("result").style.display="none";
  addBubble(input,"received");
  setTimeout(()=>{
    const typing=document.createElement("div");
    typing.className="bubble sent"; typing.id="typingBubble";
    typing.innerHTML=`<span class="typing"></span><span class="typing"></span><span class="typing"></span>`;
    document.getElementById("chat").appendChild(typing); typing.scrollIntoView();
  },500);
  setTimeout(()=>{const typing=document.getElementById("typingBubble");if(typing)typing.remove();analyze(input);},2000);
}

// ===== Analyze text =====
function analyze(textRaw){
  const text=textRaw.toLowerCase(); let effortScore=60+Math.random()*30; let meaning=""; let replies={};
  const isShort=text.length<12; const isLong=text.length>80;

  if(text.includes("wyd")){meaning=getMeaning("wyd");replies={soft:"Just relaxing 😊 you?",savage:"Living my life. You?",blackCat:"Hmm, maybe later.",darkFemme:"Could be busy, you?"};effortScore=45;}
  else if(text.includes("you up")){meaning=getMeaning("you up");replies={soft:"Barely lol",savage:"No ❤️",blackCat:"Not now.",darkFemme:"Sleep time. Catch you later."};effortScore=35;}
  else if(text.includes("miss")){meaning=getMeaning("miss");replies={soft:"Aww 🥺",savage:"I know",blackCat:"Hmm.",darkFemme:"Interesting."};effortScore=85;}
  else if(text.includes("?")){meaning=getMeaning("question");replies={soft:"Haha yeah 😊",savage:"Why?",blackCat:"Depends.",darkFemme:"Could be."};effortScore=75;}
  else if(isLong){meaning=getMeaning("longMsg");replies={soft:"That was sweet 🥺",savage:"You wrote all that?",blackCat:"Noted.",darkFemme:"Thanks for sharing."};effortScore=90;}
  else if(isShort){meaning=getMeaning("shortMsg");replies={soft:"Hey 😊",savage:"That’s it?",blackCat:"Mm.",darkFemme:"Hmm."};effortScore=45;}
  else{meaning=getMeaning("neutral");replies={soft:"Nice 😊",savage:"Okay…",blackCat:"K.",darkFemme:"Sure."};effortScore=65;}
  effortScore=Math.round(effortScore); showResult(effortScore,meaning,replies);
}

// ===== Show result =====
function showResult(score,meaning,replies){
  const result=document.getElementById("result"); result.style.display="block";
  document.getElementById("score").innerText=`Effort Score: ${score}/100`;
  document.getElementById("meaningCard").innerHTML=`<strong>What he means:</strong><br>${meaning}`;
  document.getElementById("repliesCard").innerHTML=`
    <strong>Replies:</strong><br><br>
    💕 ${replies.soft}<br>
    😈 ${replies.savage}<br><br>
    <div class="locked" id="lockedReply1">👑 ${replies.blackCat}</div>
    <div class="locked" id="lockedReply2">🖤 ${replies.darkFemme}</div>
  `;
}

// ===== Pay subscription (real PayFast redirect placeholder) =====
function paySubscription(amount){
  fetch("/.netlify/functions/payfast",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({product:"clapbackai",amount:amount})})
  .then(res=>res.json()).then(data=>{if(data.url){window.location.href=data.url;}else{alert("Error generating payment link");}}).catch(err=>{console.error(err);alert("Payment request failed");});
}

// ===== Reset / Screenshot =====
function resetApp(){document.getElementById("chat").innerHTML="";document.getElementById("result").style.display="none";document.getElementById("inputText").value="";unlocked=false;}
function share(){const screenshotArea=document.getElementById("screenshotArea");if(!screenshotArea)return;html2canvas(screenshotArea,{scale:2}).then(canvas=>{const link=document.createElement("a");link.download="clapbackai-text.png";link.href=canvas.toDataURL();link.click();});}

// ===== Auto-unlock if paid =====
window.onload=function(){
  const params=new URLSearchParams(window.location.search);
  if(params.get("paid")==="true"){document.querySelectorAll('.locked').forEach(el=>el.style.filter="none");const paywall=document.getElementById("paywall");if(paywall)paywall.innerHTML="✨ Payment received. Go text him!";}
};
</script>
