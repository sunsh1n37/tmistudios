<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">

<title>DollFin</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins,sans-serif;
background:linear-gradient(135deg,#5D0565,#A64CA6,#E0B6E4);
background-attachment:fixed;
padding:20px;
color:white;
}

#planCorner{
position:fixed;
top:20px;
right:20px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(12px);
padding:8px 14px;
border-radius:30px;
font-size:12px;
cursor:pointer;
border:1px solid rgba(255,255,255,0.3);
}

.card{
background:rgba(255,255,255,0.18);
backdrop-filter:blur(20px);
border-radius:25px;
padding:25px;
margin-bottom:25px;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
}

h2,h3{
margin-top:0;
}

input{
width:100%;
padding:14px;
border-radius:15px;
border:none;
margin-bottom:12px;
font-size:14px;
}

button{
background:white;
color:#5D0565;
border:none;
padding:12px 18px;
border-radius:20px;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 15px white;
}

#scoreDisplay{
font-size:48px;
font-weight:700;
text-align:center;
text-shadow:0 0 20px white;
}

.progressBar{
height:14px;
background:rgba(255,255,255,0.3);
border-radius:20px;
overflow:hidden;
margin-top:10px;
}

.progressFill{
height:100%;
width:0%;
background:white;
transition:width 1.2s ease;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(15px);
display:none;
padding:30px;
overflow:auto;
z-index:9999;
}

.planCard{
background:white;
color:#5D0565;
padding:22px;
border-radius:25px;
margin-bottom:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.planPrice{
font-weight:700;
margin:10px 0;
}

.planBtn{
width:100%;
}

.planBtn.current{
background:#ccc;
cursor:not-allowed;
}

.premiumBadge{
background:gold;
color:black;
padding:4px 10px;
border-radius:15px;
font-size:11px;
font-weight:bold;
display:inline-block;
}

.shareCard{
margin-top:25px;
background:linear-gradient(135deg,#ff7be5,#9c6bff);
padding:25px;
border-radius:25px;
text-align:center;
color:white;
box-shadow:0 10px 40px rgba(0,0,0,0.3);
}

</style>
</head>

<body>

<div id="planCorner" onclick="openPlans()">
<span id="planText"></span>
</div>

<h2>💎 DollFin</h2>

<div class="card">

<h3>Enter Monthly Income</h3>

<input id="incomeInput" type="number" placeholder="Monthly Income">

<h3>Optional: Lifestyle Spending</h3>

<input id="lifestyleInput" type="number" placeholder="Fun / Lifestyle">

<button onclick="generateScore()">Calculate</button>

<div id="budgetOutput" style="margin-top:20px;"></div>

</div>

<div class="overlay" id="plansOverlay">

<button onclick="closePlans()">Close</button>

<h2>Upgrade</h2>

<div id="plansContainer"></div>

</div>

<script>
// ---------------------------
// DollFin Paywall Script
// ---------------------------

// Elements
const drawScoreBtn = document.getElementById("drawScoreBtn"); // button to calculate/show score
const paywall = document.getElementById("paywall");
const payProBtn = document.getElementById("payProBtn");
const payPremiumBtn = document.getElementById("payPremiumBtn");
const paywallClose = document.getElementById("paywallClose");

let firstDrawDone = false;

// Show paywall after first score calculation
drawScoreBtn.onclick = () => {
  if (!firstDrawDone) {
    firstDrawDone = true;
    // Show paywall immediately after first draw
    paywall.style.display = 'flex';
  }
};

// Close paywall
paywallClose.onclick = () => {
  paywall.style.display = 'none';
};

// Universal PayFast POST function
async function payDollFin(tier) {
  try {
    const res = await fetch('https://tmistudios.xyz/.netlify/functions/payfast', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tier }) // MUST send as "tier" for subscriptions
    });
    const data = await res.json();
    if (data.url) {
      window.location.href = data.url;
    } else {
      alert('Payment failed. Try again.');
    }
  } catch (err) {
    console.error(err);
    alert('Payment request failed.');
  }
}

// Hook up paywall buttons
payProBtn.onclick = () => payDollFin('pro');
payPremiumBtn.onclick = () => payDollFin('premium');

</script>

</body>
</html>
